apiVersion: apps/v1
kind: Deployment
metadata:
  name:  ai-deployment
  labels:
    name:  ai-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-server
  template:
    metadata:
      labels:
        app: ai-server
    spec:
      containers:
      - image:  ai-orchestration
        name:  ai-server
        resources:
          requests:
            cpu: "250m"
            memory: "128M"
          limits:
            cpu: "500m"
            memory: "250Mi"
        livenessProbe:
          httpGet:
            path: /api/status/health
            port: 3000
          initialDelaySeconds: 90
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/status/health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10
        env:
          - name:  AI_PORT
            valueFrom:
              secretKeyRef:
                name:  port
                key:  AI_PORT
          - name:  MISTRALAI_API_KEY
            valueFrom:
              secretKeyRef:
                name:  ai-secret
                key:  MISTRALAI_API_KEY
          
          - name:  ANTHROPIC_API_KEY
            valueFrom:
              secretKeyRef:
                name:  ai-secret
                key:  ANTHROPIC_API_KEY
        ports:
        - containerPort:  3000
          name:  ai-server-port
      